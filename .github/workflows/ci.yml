name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

# Cancel any in-progress run on the same branch when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check & Lint
    # WARDEN uses Win32 APIs (Credential Manager, DPAPI) — must run on Windows.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # ── Node / frontend ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ── Rust / backend ───────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Smart Rust cache: hashes Cargo.lock, restores registry + target tree.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check

      - name: Clippy (deny warnings)
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test
