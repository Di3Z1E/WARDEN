name: Release

# Trigger on version tags: v0.2.0, v1.0.0-beta.1, etc.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Publish
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create the GitHub Release

    steps:
      - uses: actions/checkout@v7

      # ── Node / frontend ──────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      # ── Rust / backend ───────────────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Build Tauri release
        run: npm run tauri build

      # ── Publish ───────────────────────────────────────────────────────────────
      # Uploads warden.exe, the MSI, and the NSIS installer to a new GitHub Release.
      # Pre-release flag is set automatically when the tag contains a hyphen (e.g. v1.0.0-beta.1).
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: WARDEN ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/warden.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
